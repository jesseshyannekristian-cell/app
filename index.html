<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCP Site Overseer</title>
    <style>
        body, html { margin:0; padding:0; height:100%; background:#000; color:#f00; font-family:monospace; }
        .container { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9));
        }
        h1 { font-size: 4.5rem; margin: 10px; text-shadow: 0 0 20px #f00; }
        button { 
            padding: 30px 100px; 
            font-size: 2.5rem; 
            margin-top: 50px; 
            background: #300; 
            color: #0ff; 
            border: 5px solid #0ff; 
            cursor: pointer; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SCP SITE</h1>
        <h1>OVERSEER</h1>
        <p style="font-size:2rem;">CLEARANCE LEVEL: 5</p>
        <button onclick="alert('Game Started! Run python play.py for the full terminal game.')">START GAME</button>
    </div>
</body>
</html>
