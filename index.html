<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCP Site Overseer</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: url('https://github.com/jesseshyannekristian-cell/app/raw/main/attachments/ChatGPT%20Image%20Jul%202,%202026,%2001_28_13%20AM.png') center/cover no-repeat;
            color: #ff4444;
            font-family: monospace;
            position: relative;
        }
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.75);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 {
            font-size: 4.5rem;
            text-shadow: 0 0 30px #ff0000;
        }
        button {
            margin-top: 50px;
            padding: 25px 70px;
            font-size: 2rem;
            background: #000;
            color: #00ffff;
            border: 4px solid #00ffff;
            cursor: pointer;
        }
        .game {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            background: rgba(0,0,0,0.9);
        }
    </style>
</head>
<body>
    <div id="title" class="overlay">
        <h1>SCP SITE OVERSEER</h1>
        <button onclick="startGame()">START GAME</button>
    </div>

    <div id="game" class="game">
        <h1 style="color:#0f0;">SITE-20 COMMAND HUB</h1>
        <p style="color:#0f0; margin:20px;">Welcome, Overseer Omega Black</p>
        <button onclick="alert('Research started')">RESEARCH</button>
        <button onclick="alert('Store opened')">REQUISITION STORE</button>
        <button onclick="alert('Breach mode activated')">BREACH RESPONSE</button>
        <button onclick="backToTitle()">BACK TO TITLE</button>
    </div>

    <script>
        function startGame() {
            document.getElementById('title').style.display = 'none';
            document.getElementById('game').style.display = 'flex';
        }
        function backToTitle() {
            document.getElementById('game').style.display = 'none';
            document.getElementById('title').style.display = 'flex';
        }
    </script>
</body>
</html>
