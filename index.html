<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCP Site Overseer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            color: #0f0; 
            font-family: 'Courier New', monospace; 
            height: 100vh; 
            overflow: hidden;
        }
        .screen { display: none; flex-direction: column; height: 100vh; }
        .active { display: flex; }

        /* Title Screen */
        .title-screen {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('https://github.com/jesseshyannekristian-cell/app/raw/main/attachments/ChatGPT%20Image%20Jul%202,%202026,%2001_28_13%20AM.png') center/cover;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #ff4444;
        }
        .title { font-size: 5rem; text-shadow: 0 0 30px #f00; margin-bottom: 20px; }
        .btn { 
            margin-top: 60px; padding: 25px 80px; font-size: 2.2rem; 
            background: #001122; color: #00ffff; border: 4px solid #00ffff; 
            cursor: pointer; text-transform: uppercase;
        }
        .btn:hover { background: #003344; }

        /* Game Screen */
        .game-screen {
            flex-direction: column;
        }
        .header {
            background: #220000;
            padding: 15px;
            text-align: center;
            border-bottom: 3px solid #f00;
        }
        .content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }
        button.game-btn {
            background: #002200;
            color: #0f0;
            border: 2px solid #0f0;
            padding: 12px 25px;
            margin: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- TITLE SCREEN -->
    <div id="titleScreen" class="screen active title-screen">
        <h1 class="title">SCP SITE OVERSEER</h1>
        <p style="font-size:1.6rem; margin:20px 0;">CLEARANCE LEVEL: 5</p>
        <button class="btn" onclick="startGame()">START GAME</button>
    </div>

    <!-- GAME SCREEN -->
    <div id="gameScreen" class="screen game-screen">
        <div class="header">
            <h2>SITE-20 COMMAND HUB — OMEGA BLACK</h2>
        </div>
        <div class="content">
            <h3>Welcome, Overseer.</h3>
            <p>What would you like to do?</p>
            
            <button class="game-btn" onclick="alert('Research Division opened (coming soon)')">RESEARCH DIVISION</button>
            <button class="game-btn" onclick="alert('Requisition Store opened (coming soon)')">REQUISITION STORE</button>
            <button class="game-btn" onclick="alert('Containment Operations started')">CONTAINMENT OPERATIONS</button>
            <button class="game-btn" onclick="alert('Breach Response activated')">BREACH RESPONSE</button>
            <button class="game-btn" onclick="backToTitle()">RETURN TO TITLE</button>
        </div>
    </div>

    <script>
        function startGame() {
            document.getElementById('titleScreen').classList.remove('active');
            document.getElementById('gameScreen').classList.add('active');
        }

        function backToTitle() {
            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('titleScreen').classList.add('active');
        }
    </script>
</body>
</html>
