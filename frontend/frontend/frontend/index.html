<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCP Site Overseer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background"></div>
    
    <div class="container">
        <h1 class="title">SCP Site</h1>
        <h2 class="title">Overseer</h2>
        
        <div class="agent">
            <div class="eyes">◉ ◉</div>
        </div>

        <div class="menu">
            <button onclick="startGame()" class="btn">
                <span class="icon">⚙︎</span>
                START GAME
                <span class="arrow">→</span>
            </button>
        </div>

        <div class="status">
            CLEARANCE LEVEL: 5<br>
            <span style="color:#00ff88;">Access Granted • USER: OMEGA BLACK</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
